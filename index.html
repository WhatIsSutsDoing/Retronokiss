<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SNAKE</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #39ff14;
    --green-dim: #1a7a09;
    --green-glow: rgba(57,255,20,0.4);
    --red: #ff2d2d;
    --bg: #010a01;
    --grid: #0b1f0b;
    --dpad-size: 64px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body { height: 100%; overflow: hidden; }

  body {
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    height: 100dvh;
    font-family: 'Press Start 2P', monospace;
    color: var(--green);
    padding: 8px 8px 0;
    gap: 6px;
  }

  /* Scanlines */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px
    );
    pointer-events: none; z-index: 100;
  }

  /* Vignette */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.65) 100%);
    pointer-events: none; z-index: 99;
  }

  /* ── HEADER ── */
  h1 {
    font-size: clamp(14px, 4vw, 28px);
    letter-spacing: 0.15em;
    text-shadow: 0 0 16px var(--green), 0 0 32px var(--green-glow);
    animation: flicker 6s infinite;
    flex-shrink: 0;
  }

  /* ── HUD ── */
  .hud {
    display: flex;
    gap: clamp(16px, 5vw, 40px);
    flex-shrink: 0;
  }

  .hud-item { text-align: center; }
  .hud-label { color: var(--green-dim); font-size: 6px; margin-bottom: 4px; letter-spacing: 0.1em; }
  .hud-value {
    color: var(--green);
    font-size: clamp(14px, 4vw, 20px);
    text-shadow: 0 0 10px var(--green-glow);
    min-width: 3ch;
    display: inline-block;
  }

  /* ── Speed bar ── */
  .speed-bar-wrap {
    width: 100%;
    max-width: 360px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .speed-label { font-size: 6px; color: var(--green-dim); letter-spacing: 0.1em; white-space: nowrap; }

  .speed-bar-bg {
    flex: 1; height: 4px;
    background: var(--grid);
    border: 1px solid var(--green-dim);
    border-radius: 2px; overflow: hidden;
  }

  .speed-bar-fill {
    height: 100%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    border-radius: 2px;
    transition: width 0.4s ease;
    width: 4%;
  }

  /* ── CANVAS ── */
  .canvas-wrap {
    position: relative;
    flex-shrink: 0;
    border: 2px solid var(--green-dim);
    box-shadow: 0 0 0 1px #000, 0 0 18px var(--green-glow), inset 0 0 16px rgba(0,0,0,0.5);
    border-radius: 2px;
  }

  canvas {
    display: block;
    background: var(--bg);
    image-rendering: pixelated;
  }

  /* ── OVERLAYS ── */
  .overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(1,10,1,0.93);
    gap: 14px; z-index: 10; padding: 16px;
  }

  .overlay.hidden { display: none; }

  .overlay-title {
    font-size: clamp(10px, 3vw, 18px);
    text-shadow: 0 0 20px var(--green);
    animation: pulse 1.2s ease-in-out infinite;
    text-align: center; line-height: 2;
  }

  .overlay-title.red {
    color: var(--red);
    text-shadow: 0 0 20px rgba(255,45,45,0.6);
  }

  .final-score {
    font-size: clamp(8px, 2vw, 12px);
    color: var(--green-dim);
    text-align: center; line-height: 2.4;
  }

  .final-score span { color: var(--green); }

  .overlay-hint {
    font-size: 6px; color: var(--green-dim);
    text-align: center; line-height: 2.2; letter-spacing: 0.1em;
  }

  .btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px; background: transparent;
    color: var(--green); border: 2px solid var(--green);
    padding: 10px 20px; cursor: pointer;
    letter-spacing: 0.1em; transition: all 0.15s;
    text-shadow: 0 0 8px var(--green-glow);
    box-shadow: 0 0 10px var(--green-glow);
  }

  .btn:hover, .btn:active {
    background: var(--green); color: var(--bg);
    box-shadow: 0 0 24px var(--green);
  }

  /* ── D-PAD ── always visible ── */
  .dpad {
    flex-shrink: 0;
    display: flex; flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 8px 0 12px;
  }

  .dpad-row { display: flex; gap: 4px; align-items: center; }

  .dpad-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(12px, 3.5vw, 18px);
    width: var(--dpad-size); height: var(--dpad-size);
    background: rgba(11,31,11,0.9);
    color: var(--green);
    border: 2px solid var(--green-dim);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    border-radius: 6px;
    user-select: none; -webkit-user-select: none;
    touch-action: manipulation;
    transition: background 0.08s, border-color 0.08s, transform 0.08s;
    box-shadow: 0 0 8px rgba(57,255,20,0.12), inset 0 -3px 0 rgba(0,0,0,0.4);
  }

  .dpad-btn:active, .dpad-btn.pressed {
    background: var(--green-dim);
    border-color: var(--green);
    transform: scale(0.92);
    box-shadow: 0 0 14px var(--green-glow);
  }

  .dpad-space { width: var(--dpad-size); height: var(--dpad-size); }

  /* ── Animations ── */
  @keyframes flicker {
    0%,95%,100% { opacity: 1; }
    96% { opacity: 0.8; }
    97% { opacity: 1; }
    98.5% { opacity: 0.88; }
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.45; }
  }
  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.35); }
    100% { transform: scale(1); }
  }

  .pop { animation: pop 0.15s ease; }

  @media (max-width: 380px) { :root { --dpad-size: 54px; } }
  @media (min-width: 600px) { :root { --dpad-size: 74px; } }
</style>
</head>
<body>

<h1>SNAKE</h1>

<div class="hud">
  <div class="hud-item">
    <div class="hud-label">SCORE</div>
    <div class="hud-value" id="score">0</div>
  </div>
  <div class="hud-item">
    <div class="hud-label">BEST</div>
    <div class="hud-value" id="best">0</div>
  </div>
  <div class="hud-item">
    <div class="hud-label">SPEED</div>
    <div class="hud-value" id="speedLabel">1</div>
  </div>
</div>

<div class="speed-bar-wrap">
  <span class="speed-label">SLOW</span>
  <div class="speed-bar-bg"><div class="speed-bar-fill" id="speedBar"></div></div>
  <span class="speed-label">FAST</span>
</div>

<div class="canvas-wrap">
  <canvas id="gameCanvas"></canvas>

  <div class="overlay" id="startScreen">
    <div class="overlay-title">🐍 READY?</div>
    <button class="btn" id="startBtn">▶ START</button>
    <div class="overlay-hint">
      USE D-PAD BELOW OR ARROW KEYS<br>
      EAT 🍎 TO GROW &amp; SCORE 10 PTS<br>
      SPEED INCREASES AS YOU SCORE
    </div>
  </div>

  <div class="overlay hidden" id="gameOverScreen">
    <div class="overlay-title red">GAME OVER!</div>
    <div class="final-score" id="finalScore"></div>
    <button class="btn" id="restartBtn">↺ PLAY AGAIN</button>
  </div>
</div>

<!-- D-Pad: always on screen for everyone -->
<div class="dpad">
  <div class="dpad-row">
    <div class="dpad-space"></div>
    <button class="dpad-btn" id="btn-UP">▲</button>
    <div class="dpad-space"></div>
  </div>
  <div class="dpad-row">
    <button class="dpad-btn" id="btn-LEFT">◀</button>
    <button class="dpad-btn" id="btn-DOWN">▼</button>
    <button class="dpad-btn" id="btn-RIGHT">▶</button>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');

const COLS = 20, ROWS = 20;
let CELL;

function resizeCanvas() {
  const dpadSize  = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--dpad-size')) || 64;
  const dpadH     = dpadSize * 2 + 4 + 20; // two rows + gap + padding
  const reserved  = 8 + 36 + 6 + 36 + 6 + 20 + 6 + dpadH + 20; // pad+h1+hud+bar+dpad
  const available = Math.min(window.innerHeight - reserved, window.innerWidth - 16);
  const size      = Math.max(Math.floor(available / COLS) * COLS, COLS * 10);
  CELL = size / COLS;
  canvas.width  = size;
  canvas.height = size;
}

resizeCanvas();
window.addEventListener('resize', () => { resizeCanvas(); if (!running) drawIdle(); });

// ── State ──
let snake, dir, nextDir, apple, score, best, running, animId, particles;
best = 0;

// Speed: 220ms at score 0 → 60ms at score 300+ (smooth ease-in curve)
function getSpeed() {
  const t = Math.min(score / 300, 1);
  return Math.round(220 - (220 - 60) * t * t);
}

function getSpeedPct() { return Math.round(((220 - getSpeed()) / 160) * 100); }
function getSpeedLevel() { return Math.max(1, Math.ceil(getSpeedPct() / 10)); }

function initGame() {
  const mid = Math.floor(COLS / 2);
  snake   = [{x:mid,y:mid},{x:mid-1,y:mid},{x:mid-2,y:mid}];
  dir     = {x:1, y:0};
  nextDir = {x:1, y:0};
  score   = 0;
  particles = [];
  placeApple();
  updateHUD();
}

function placeApple() {
  let p;
  do { p = {x:Math.floor(Math.random()*COLS), y:Math.floor(Math.random()*ROWS)}; }
  while (snake.some(s=>s.x===p.x&&s.y===p.y));
  apple = p;
}

// ── Particles ──
function spawnParticles(x, y) {
  for (let i=0; i<12; i++) {
    const a = (Math.PI*2/12)*i + Math.random()*0.4;
    particles.push({
      x:x*CELL+CELL/2, y:y*CELL+CELL/2,
      vx:Math.cos(a)*(2+Math.random()*4),
      vy:Math.sin(a)*(2+Math.random()*4),
      life:1, size:2+Math.random()*3
    });
  }
}

function tickParticles() {
  particles = particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy;
    p.vx*=0.88; p.vy*=0.88;
    p.life-=0.055;
  });
}

function drawParticles() {
  particles.forEach(p=>{
    ctx.globalAlpha=p.life;
    ctx.fillStyle='#39ff14';
    ctx.shadowBlur=6; ctx.shadowColor='#39ff14';
    ctx.fillRect(p.x-p.size/2, p.y-p.size/2, p.size, p.size);
  });
  ctx.globalAlpha=1; ctx.shadowBlur=0;
}

// ── Render ──
function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Grid dots
  ctx.fillStyle='#0b1f0b';
  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++)
    ctx.fillRect(c*CELL+CELL/2-1, r*CELL+CELL/2-1, 2, 2);

  // Snake body
  snake.forEach((seg,i)=>{
    const head=i===0, t=1-(i/snake.length)*0.6, pad=head?1:2;
    ctx.fillStyle=head?'#39ff14':`rgba(57,255,20,${t})`;
    ctx.shadowBlur=head?16:5; ctx.shadowColor='#39ff14';
    roundRect(seg.x*CELL+pad, seg.y*CELL+pad, CELL-pad*2, CELL-pad*2, head?4:3);
    if (head) {
      ctx.shadowBlur=0; ctx.fillStyle='#010a01';
      const ex=dir.x===0?[0.28,0.68]:dir.x>0?[0.65,0.65]:[0.28,0.28];
      const ey=dir.y===0?[0.28,0.68]:dir.y>0?[0.65,0.65]:[0.28,0.28];
      const es=CELL*0.13;
      ctx.fillRect(seg.x*CELL+CELL*ex[0]-es/2, seg.y*CELL+CELL*ey[0]-es/2, es, es);
      ctx.fillRect(seg.x*CELL+CELL*ex[1]-es/2, seg.y*CELL+CELL*ey[1]-es/2, es, es);
    }
  });

  ctx.shadowBlur=0;

  // Apple
  const ax=apple.x*CELL+CELL/2, ay=apple.y*CELL+CELL/2, ar=CELL*0.36;
  ctx.shadowBlur=18; ctx.shadowColor='#ff2d2d';
  ctx.fillStyle='#ff2d2d';
  ctx.beginPath(); ctx.arc(ax,ay,ar,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,255,0.35)';
  ctx.beginPath(); ctx.arc(ax-ar*0.25,ay-ar*0.3,ar*0.28,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#1a7a09'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(ax,ay-ar); ctx.lineTo(ax+3,ay-ar-5); ctx.stroke();

  tickParticles(); drawParticles();
}

function roundRect(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath(); ctx.fill();
}

function drawIdle() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#0b1f0b';
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++)
    ctx.fillRect(c*CELL+CELL/2-1,r*CELL+CELL/2-1,2,2);
}

function updateHUD() {
  document.getElementById('score').textContent    = score;
  document.getElementById('best').textContent     = best;
  document.getElementById('speedLabel').textContent = getSpeedLevel();
  document.getElementById('speedBar').style.width   = Math.max(getSpeedPct(),4)+'%';
}

// ── Game loop ──
let lastTime=0;
function gameLoop(ts) {
  if (!running) return;
  if (ts-lastTime >= getSpeed()) { lastTime=ts; update(); }
  draw();
  animId=requestAnimationFrame(gameLoop);
}

function update() {
  dir={...nextDir};
  const head={x:snake[0].x+dir.x, y:snake[0].y+dir.y};
  if (head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS) return endGame();
  if (snake.some(s=>s.x===head.x&&s.y===head.y)) return endGame();
  snake.unshift(head);
  if (head.x===apple.x&&head.y===apple.y) {
    score+=10;
    if (score>best) best=score;
    spawnParticles(apple.x,apple.y);
    placeApple(); updateHUD();
    const el=document.getElementById('score');
    el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop');
  } else { snake.pop(); }
}

function endGame() {
  running=false; cancelAnimationFrame(animId);
  if(score>best) best=score;
  ctx.fillStyle='rgba(255,45,45,0.12)';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  document.getElementById('finalScore').innerHTML=
    `SCORE &nbsp;<span>${score}</span><br>BEST &nbsp;&nbsp;<span>${best}</span><br>SPEED &nbsp;<span>${getSpeedLevel()}/10</span>`;
  document.getElementById('gameOverScreen').classList.remove('hidden');
}

function startGame() {
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameOverScreen').classList.add('hidden');
  initGame(); running=true; lastTime=0;
  animId=requestAnimationFrame(gameLoop);
}

// ── Keyboard ──
const OPPOSITE={UP:'DOWN',DOWN:'UP',LEFT:'RIGHT',RIGHT:'LEFT'};
const KEYS={
  ArrowUp:{x:0,y:-1,n:'UP'},ArrowDown:{x:0,y:1,n:'DOWN'},
  ArrowLeft:{x:-1,y:0,n:'LEFT'},ArrowRight:{x:1,y:0,n:'RIGHT'}
};

document.addEventListener('keydown', e=>{
  const d=KEYS[e.key]; if(!d) return; e.preventDefault();
  const cur=Object.values(KEYS).find(k=>k.x===dir.x&&k.y===dir.y);
  if(!cur||OPPOSITE[d.n]!==cur.n) nextDir={x:d.x,y:d.y};
});

// ── D-pad ──
const DPAD={
  'btn-UP':   {x:0,y:-1,n:'UP'},
  'btn-DOWN': {x:0,y:1, n:'DOWN'},
  'btn-LEFT': {x:-1,y:0,n:'LEFT'},
  'btn-RIGHT':{x:1,y:0, n:'RIGHT'}
};

function pressDir(id) {
  const d=DPAD[id]; if(!d) return;
  const cur=Object.values(KEYS).find(k=>k.x===dir.x&&k.y===dir.y);
  if(!cur||OPPOSITE[d.n]!==cur.n) nextDir={x:d.x,y:d.y};
  const btn=document.getElementById(id);
  btn.classList.add('pressed');
  setTimeout(()=>btn.classList.remove('pressed'),120);
}

Object.keys(DPAD).forEach(id=>{
  const btn=document.getElementById(id);
  btn.addEventListener('touchstart', e=>{ e.preventDefault(); pressDir(id); },{passive:false});
  btn.addEventListener('mousedown',  e=>{ e.preventDefault(); pressDir(id); });
});

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', startGame);

drawIdle();
</script>
</body>
</html>
